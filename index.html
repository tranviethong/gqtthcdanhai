<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CỔNG DỊCH VỤ CÔNG GIẢI QUYẾT THỦ TỤC HÀNH CHÍNH CÁC BỘ, NGÀNH</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #C62828;
      --red-bg: #FFEBEE;
      --bg:     #F5F6F8;
      --white:  #FFFFFF;
      --border: #E0E3EA;
      --text:   #1A1F2E;
      --muted:  #5C6478;
      --accent: #1565C0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* Header */
    .top-bar {
      background: var(--red);
      color: #fff;
      padding: 0.55rem 1.5rem;
      font-size: 12px;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar svg { flex-shrink: 0; }

    header {
      background: var(--white);
      border-bottom: 3px solid var(--red);
      padding: 1.25rem 2rem 1rem;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .logo-mark {
      width: 52px; height: 52px;
      background: var(--red);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 30px; height: 30px; }
    .header-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--red);
      line-height: 1.25;
    }
    .header-text p {
      font-size: 12.5px;
      color: var(--muted);
      margin-top: 3px;
    }

    /* Main */
    main {
      max-width: 960px;
      margin: 2rem auto 0;
      padding: 0 1.25rem;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--card-accent, var(--accent));
      border-radius: 2px 0 0 2px;
    }
    .card:hover {
      border-color: var(--card-accent, var(--accent));
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    .card-icon {
      width: 44px; height: 44px;
      border-radius: 8px;
      background: var(--icon-bg, #E3F2FD);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 22px;
    }
    .card-info { min-width: 0; }
    .card-info strong {
      display: block;
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-info span {
      font-size: 11.5px;
      color: var(--muted);
      display: block;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-arrow {
      margin-left: auto;
      flex-shrink: 0;
      color: var(--border);
      font-size: 18px;
      transition: color 0.15s, transform 0.15s;
    }
    .card:hover .card-arrow {
      color: var(--card-accent, var(--accent));
      transform: translateX(3px);
    }

    footer {
      max-width: 960px;
      margin: 2.5rem auto 0;
      padding: 0 1.25rem;
      font-size: 11.5px;
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
    }
